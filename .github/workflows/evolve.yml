name: Evolve Worlds

on:
  schedule:
    - cron: '*/14 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: read

jobs:
  evolve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run evolution
        run: node scripts/evolve-all.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
