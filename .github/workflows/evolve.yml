name: Evolve Worlds (manual)

on:
  workflow_dispatch:
    inputs:
      worlds:
        description: 'Comma-separated world IDs to evolve (empty = all)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  list-worlds:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.get-worlds.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - name: List worlds
        id: get-worlds
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_WORLDS: ${{ github.event.inputs.worlds }}
        run: |
          WORLDS=$(gh api repos/${{ github.repository }}/contents/data/worlds --jq '[.[].name]' 2>/dev/null) || { echo "gh api failed, treating as empty"; WORLDS='[]'; }
          if [ -n "$INPUT_WORLDS" ]; then
            FILTERED="[]"
            IFS=',' read -ra IDS <<< "$INPUT_WORLDS"
            for i in "${!IDS[@]}"; do IDS[$i]=$(echo "${IDS[$i]}" | xargs); done
            for w in $(echo "$WORLDS" | jq -r '.[]'); do
              for id in "${IDS[@]}"; do
                if [ "$w" = "$id" ]; then
                  FILTERED=$(echo "$FILTERED" | jq -c --arg w "$w" '. + [$w]')
                fi
              done
            done
            WORLDS="$FILTERED"
          fi
          echo "matrix={\"world\":$WORLDS}" >> "$GITHUB_OUTPUT"
          echo "Worlds: $(echo $WORLDS | jq -r 'join(\", \")')"
          echo "Count: $(echo $WORLDS | jq 'length')"

  evolve:
    needs: list-worlds
    if: ${{ fromJSON(needs.list-worlds.outputs.matrix).world[0] != '' }}
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJSON(needs.list-worlds.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Evolve ${{ matrix.world }}
        run: node scripts/evolve-one.js ${{ matrix.world }}
        env:
          GITHUB_TOKEN: ${{ github.token }}


